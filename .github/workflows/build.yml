name: Build SonOyuncu Lag Switch

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodu Klonla
      uses: actions/checkout@v4
      with:
        repository: ${{ github.repository }}
        path: 'sonoyuncu_proje'

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      working-directory: 'sonoyuncu_proje'
      run: |
        python -m pip install --upgrade pip
        pip install pydivert psutil keyboard pyinstaller

    - name: Klasör Tabanlı EXE Derleme (Temp Hatasız)
      working-directory: 'sonoyuncu_proje'
      run: |
        # --onedir parametresi Temp hatasını kesin olarak çözer
        pyinstaller --noconsole --onedir --uac-admin main.py

    - name: Klasörü ZIP Olarak Paketle
      working-directory: 'sonoyuncu_proje/dist'
      run: |
        powershell Compress-Archive -Path main -DestinationPath ../../SonOyuncu-LagSwitch.zip

    - name: Hazır ZIP Dosyasını GitHub'a Yükle
      uses: actions/upload-artifact@v4
      with:
        name: SonOyuncu-LagSwitch-Klasor
        path: SonOyuncu-LagSwitch.zip
        
